# Cloud Build configuration for Google Cloud Run deployment
# Usage: gcloud builds submit --config cloudbuild.yaml
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/devops-agent-x:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/devops-agent-x:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/devops-agent-x'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'devops-agent-x'
      - '--image=gcr.io/$PROJECT_ID/devops-agent-x:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=8080'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/devops-agent-x:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/devops-agent-x:latest'

options:
  logging: CLOUD_LOGGING_ONLY
