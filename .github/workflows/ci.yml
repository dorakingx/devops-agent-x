name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (DEMO MODE – no API key needed)
        run: npm test

  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-agent-x:ci .

      - name: Smoke test /healthz
        run: |
          docker run -d --name agent-x -p 8080:8080 devops-agent-x:ci
          sleep 3
          curl --fail http://localhost:8080/healthz
          docker stop agent-x
